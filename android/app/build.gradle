apply plugin: 'com.android.application'

android {
    namespace 'com.sakib.store'
    compileSdk 34

    defaultConfig {
        applicationId "com.sakib.store"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    configurations.all {
        resolutionStrategy {
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk1.8"
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk1.7"
        }
    }
}
