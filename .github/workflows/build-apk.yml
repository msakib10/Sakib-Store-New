name: Build Sakib Store Android App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install System Tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor Android Package
        run: npm install @capacitor/android

      - name: Remove Old Android Folder
        run: rm -rf android

      - name: Setup Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate App Icons
        run: |
          LOGO="public/Logopit_1772536689111.png"
          RES_DIR="android/app/src/main/res"
          
          if [ ! -f "$LOGO" ]; then
            echo "Logo not found"
            exit 1
          fi
          
          declare -A sizes=(
            ["mipmap-ldpi"]="36"
            ["mipmap-mdpi"]="48"
            ["mipmap-hdpi"]="72"
            ["mipmap-xhdpi"]="96"
            ["mipmap-xxhdpi"]="144"
            ["mipmap-xxxhdpi"]="192"
          )
          
          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            mkdir -p "$RES_DIR/$folder"
            
            convert "$LOGO" \
              -resize ${size}x${size} \
              -gravity center \
              -extent ${size}x${size} \
              -quality 95 \
              "$RES_DIR/$folder/ic_launcher.png"
            
            convert "$LOGO" \
              -resize ${size}x${size} \
              -gravity center \
              -extent ${size}x${size} \
              "$RES_DIR/$folder/ic_launcher_round.png"
          done
          
          echo "Icons generated"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        continue-on-error: true
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Bundle
        continue-on-error: true
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-APK
          path: android/app/build/outputs/
          retention-days: 30

      - name: Build Status
        if: success()
        run: echo "Build Success - APK Ready"
