name: Final Logo Fix Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node and Java
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Web
        run: |
          npm install --force
          npm run build

      - name: Capacitor Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --force
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: 🛠️ Force Set Logo
        run: |
          # আপনার ফাইলের আসল নাম ব্যবহার করা হয়েছে
          ICON="Logopit_1772536689111.png"
          if [ -f "$ICON" ]; then
            declare -a folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for f in "${folders[@]}"; do
              mkdir -p android/app/src/main/res/$f
              cp "$ICON" android/app/src/main/res/$f/ic_launcher.png
              cp "$ICON" android/app/src/main/res/$f/ic_launcher_round.png
            done
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
