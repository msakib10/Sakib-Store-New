name: Build Sakib Store APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --force

      - name: Build Web Assets
        run: |
          mkdir -p dist
          echo "<html><body>Sakib Store Mobile App</body></html>" > dist/index.html

      - name: Repair and Sync Capacitor
        run: |
          # যদি android ফোল্ডার না থাকে তবে নতুন করে তৈরি করবে
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Final APK Build
        run: |
          # আপনার রিপোজিটরির সঠিক ফোল্ডারে ঢোকা
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
