name: Build Sakib Store APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Initialize App Config
        run: |
          # যদি capacitor.config.json না থাকে তবে তৈরি হবে
          if [ ! -f capacitor.config.json ]; then
            echo '{"appId": "com.sakib.store", "appName": "Sakib Store", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json
          fi
          # ডিস্ট ফোল্ডার তৈরি
          mkdir -p dist
          echo "<html><body>Sakib Store</body></html>" > dist/index.html

      - name: Create Android Folder & Sync
        run: |
          # অ্যান্ড্রয়েড প্ল্যাটফর্ম নেই থাকলে যোগ করবে
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Final Build APK
        run: |
          cd android
          # ডুপ্লিকেট ক্লাস সমস্যার সমাধান
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # পারমিশন ঠিক করা
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
