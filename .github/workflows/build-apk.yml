name: Success Build Sakib Store
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --force

      - name: Build Assets & Sync
        run: |
          mkdir -p dist && echo "<html><body>Sakib Store</body></html>" > dist/index.html
          # অ্যান্ড্রয়েড ফোল্ডারটি ফ্রেশ ভাবে তৈরি করা
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Final Build Execution
        run: |
          # সঠিক ফোল্ডার লোকেশনে গিয়ে গ্র্যাডল রান করা
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Download Your APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Mobile-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
