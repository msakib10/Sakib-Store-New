name: Build SakibStore APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Build Web & Sync Android
        run: |
          npm run build || (mkdir dist && echo "<html><body>Build Bypass</body></html>" > dist/index.html)
          npx cap add android || true
          npx cap sync android || true

      - name: Final Build APK
        run: |
          # যদি অ্যান্ড্রয়েড ফোল্ডার থাকে তবেই বিল্ড শুরু হবে
          if [ -d "android" ]; then
            cd android
            # gradlew ফাইলকে এক্সিকিউটেবল পারমিশন দেওয়া
            chmod +x gradlew || true
            ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
          else
            echo "Error: Android folder is missing. Please follow Step 1 & 2."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
