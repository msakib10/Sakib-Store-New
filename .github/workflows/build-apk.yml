name: Success Sakib Store APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Prepare Web Assets
        run: |
          # ডিস্ট ফোল্ডার এবং ইনডেক্স ফাইল নিশ্চিত করা
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            echo "<html><body>Sakib Store</body></html>" > dist/index.html
          fi
          # কনফিগ ফাইল নিশ্চিত করা
          if [ ! -f capacitor.config.json ]; then
            echo '{"appId": "com.sakib.store", "appName": "Sakib Store", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json
          fi

      - name: Sync Android Project
        run: |
          # প্ল্যাটফর্ম না থাকলে যোগ করবে, থাকলে শুধু সিঙ্ক করবে
          npx cap add android || echo "Android already added"
          npx cap sync android

      - name: Final Build APK
        run: |
          cd android
          # ডুপ্লিকেট ক্লাস সমস্যার সমাধান
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # ফাইল পারমিশন এবং বিল্ড শুরু
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-APK-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
