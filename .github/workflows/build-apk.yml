name: Sakib Store Final Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Web Assets
        run: |
          npm install --force
          npm run build 

      - name: Capacitor Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --force
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: 🛠️ জবরদস্তি লোগো সেট করা (Icon Fix)
        run: |
          # icon.png ফাইলটি খুঁজে বের করে সব অ্যান্ড্রয়েড ফোল্ডারে কপি করা
          if [ -f "icon.png" ]; then
            declare -a res_folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for folder in "${res_folders[@]}"; do
              mkdir -p android/app/src/main/res/$folder
              cp icon.png android/app/src/main/res/$folder/ic_launcher.png
              cp icon.png android/app/src/main/res/$folder/ic_launcher_round.png
            done
            echo "Logo updated successfully!"
          else
            echo "Error: icon.png not found in root directory!"
            exit 1
          fi

      - name: Final APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Download Updated APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Icon-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
