name: Sakib Store Guaranteed Success
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install and Build Web
        run: |
          npm install --force
          npm run build

      - name: 🛠️ Android and Logo Fix
        run: |
          # সব প্রয়োজনীয় ডিপেন্ডেন্সি লোকালি ইনস্টল করা
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --force
          
          # অ্যান্ড্রয়েড প্ল্যাটফর্ম সিঙ্ক করা
          npx cap add android || true
          
          # লোগো সেট করা
          ICON_FILE="Logopit_1772536689111.png"
          if [ -f "$ICON_FILE" ]; then
            echo "Icon Found: $ICON_FILE"
            declare -a folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for f in "${folders[@]}"; do
              mkdir -p android/app/src/main/res/$f
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher.png
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher_round.png
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher_foreground.png
            done
          fi
          
          npx cap sync android

      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: 📥 Download Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Success-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
