name: Color My Sakib Store
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install & Build Your Design
        run: |
          npm install --force
          # এটি আপনার আসল CSS/React ডিজাইনকে বিল্ড করবে
          npm run build 

      - name: Move Design to Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --force
          # পুরোনো সাদা ডিজাইন মুছে নতুন ডিজাইন ঢোকানো
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Final Colorful APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Download Colorful APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Real-Design
          path: android/app/build/outputs/apk/debug/app-debug.apk
