name: Ultimate Sakib Store Fix
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node and Java
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install and Build Web
        run: |
          npm install --force
          npm run build

      - name: 🛠️ অ্যান্ড্রয়েড ফোল্ডার ও লোগো ফিক্স
        run: |
          # ক্যাপাসিটর অ্যান্ড্রয়েড সেটআপ
          npm install @capacitor/android --force
          npx cap add android || true
          
          # আপনার লোগো ফাইলটি খুঁজে বের করা
          ICON_FILE=$(find . -maxdepth 1 -name "Logopit*.png" | head -n 1)
          
          if [ -n "$ICON_FILE" ]; then
            echo "Icon Found: $ICON_FILE"
            # অ্যান্ড্রয়েডের সব রিসোর্স ফোল্ডারে লোগোটি কপি করা
            declare -a folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for f in "${folders[@]}"; do
              mkdir -p android/app/src/main/res/$f
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher.png
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher_round.png
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher_foreground.png
            done
          fi
          
          # সিঙ্ক করা
          npx cap sync android

      - name: 🏗️ Build APK
        run: |
          cd android
          # গ্র্যাডল পারমিশন ফিক্স
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: 📥 Download Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Fixed-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
