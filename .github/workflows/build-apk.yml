name: Sakib Store Final Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Web Assets
        run: |
          npm install --force
          npm run build 

      - name: Capacitor Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --force
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: 🛠️ লোগো সেট করা (Logopit Name Fix)
        run: |
          # আপনার ফাইলের নাম Logopit_1772536689111.png ব্যবহার করে আইকন সেট করা
          TARGET_ICON="Logopit_1772536689111.png"
          
          if [ -f "$TARGET_ICON" ]; then
            declare -a res_folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for folder in "${res_folders[@]}"; do
              mkdir -p android/app/src/main/res/$folder
              cp "$TARGET_ICON" android/app/src/main/res/$folder/ic_launcher.png
              cp "$TARGET_ICON" android/app/src/main/res/$folder/ic_launcher_round.png
            done
            echo "Logo updated successfully using $TARGET_ICON!"
          else
            echo "Error: $TARGET_ICON not found in GitHub!"
            exit 1
          fi

      - name: Final APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Download Your Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Branded-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
