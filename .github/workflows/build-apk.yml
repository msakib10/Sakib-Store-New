Name: Final Online Build Fix
on: push 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' 

      - name: 🛠️ Install Dependencies & Build Web
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          npm install --save firebase --force
          npm install --save-dev @capacitor/core @capacitor/cli @capacitor/android --force
          npm install --force
          
          npm run build 

      - name: 📱 Android Logo & Fix
        run: |
          rm -rf android
          npx cap add android
          
          ICON_FILE="Logopit_1772536689111.png"
          if [ -f "$ICON_FILE" ]; then
            # মূল পরিবর্তন এখানে: লোগোর চারপাশে ৪০% স্বচ্ছ বর্ডার যুক্ত করা হয়েছে
            convert "$ICON_FILE" -bordercolor none -border 40% padded_icon.png
            
            declare -a folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for f in "${folders[@]}"; do
              mkdir -p android/app/src/main/res/$f
              cp padded_icon.png android/app/src/main/res/$f/ic_launcher.png
              cp padded_icon.png android/app/src/main/res/$f/ic_launcher_round.png
              cp padded_icon.png android/app/src/main/res/$f/ic_launcher_foreground.png
            done
          fi
          npx cap sync android 

      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: 📥 Download Branded APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Online-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
