name: Build Sakib Store APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --force

      - name: Build Web & Sync
        run: |
          mkdir -p dist && echo "<html><body>Sakib Store</body></html>" > dist/index.html
          npx cap add android || true
          npx cap sync android

      - name: Build Final APK (Fixed Path)
        run: |
          # যদি অ্যান্ড্রয়েড ফোল্ডার থাকে তবেই বিল্ড শুরু হবে
          if [ -d "android" ]; then
            cd android
            # ফাইলের পারমিশন ঠিক করা
            chmod +x gradlew
            # সরাসরি বিল্ড কমান্ড রান করা
            ./gradlew assembleDebug --stacktrace
          else
            echo "Error: Android directory not found!"
            exit 1
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
