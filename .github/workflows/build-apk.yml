name: Build Sakib Store APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # আপনার এরর অনুযায়ী এটিই দরকার

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --force

      - name: Build Web & Sync
        run: |
          mkdir -p dist && echo "<html><body>Sakib Store</body></html>" > dist/index.html
          npx cap add android || true
          npx cap sync android

      - name: Build Final APK
        run: |
          cd android
          # কটলিন ও জাভা জট খোলার কমান্ড
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
