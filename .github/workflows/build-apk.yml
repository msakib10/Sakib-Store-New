name: Final Logo Fix Sakib Store
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node and Java
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Web
        run: |
          npm install --force
          npm run build

      - name: Capacitor Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --force
          npx cap add android || true
          npx cap sync android

      - name: 🛠️ লোগো সেট করা (Universal Fix)
        run: |
          # Logopit দিয়ে শুরু হওয়া যেকোনো .png ফাইল খুঁজে বের করবে
          ICON_FILE=$(find . -maxdepth 1 -name "Logopit*.png" | head -n 1)
          
          if [ -n "$ICON_FILE" ]; then
            echo "Found Icon: $ICON_FILE"
            declare -a folders=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for f in "${folders[@]}"; do
              mkdir -p android/app/src/main/res/$f
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher.png
              cp "$ICON_FILE" android/app/src/main/res/$f/ic_launcher_round.png
            done
          else
            echo "Error: Logo file starting with Logopit not found!"
            exit 1
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SakibStore-Branded-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
