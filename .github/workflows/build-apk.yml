name: Generate App Icons
        run: |
          LOGO="Logopit_1772536689111.png"
          RES_DIR="android/app/src/main/res"
          
          if [ ! -f "$LOGO" ]; then
            echo "Logo not found at $LOGO"
            echo "Searching for logo file..."
            find . -name "*Logopit*" -type f
            exit 1
          fi
          
          echo "Found logo at: $LOGO"
          
          declare -A sizes=(
            ["mipmap-ldpi"]="36"
            ["mipmap-mdpi"]="48"
            ["mipmap-hdpi"]="72"
            ["mipmap-xhdpi"]="96"
            ["mipmap-xxhdpi"]="144"
            ["mipmap-xxxhdpi"]="192"
          )
          
          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            mkdir -p "$RES_DIR/$folder"
            
            convert "$LOGO" \
              -resize ${size}x${size} \
              -gravity center \
              -extent ${size}x${size} \
              -quality 95 \
              "$RES_DIR/$folder/ic_launcher.png"
            
            convert "$LOGO" \
              -resize ${size}x${size} \
              -gravity center \
              -extent ${size}x${size} \
              "$RES_DIR/$folder/ic_launcher_round.png"
          done
          
          echo "Icons generated successfully"
